<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('JeepSeek — Routes')}"></head>
<!-- Leaflet via CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<body>
<nav th:replace="~{fragments/layout :: nav(${currentPage})}"></nav>

<main class="max-w-4xl mx-auto mt-10 px-5">
    <h1 class="text-3xl font-bold mb-2 text-primary">Jeepney Routes</h1>
    <p class="text-muted-foreground mb-6">
        Browse all jeepney codes and routes in Cebu City. Use the search bar to
        filter by code, destination, or street name.
    </p>

    <input id="search" type="text"
           placeholder="Search by code, place, or street (e.g. 04L, Ayala, Colon)..."
           class="w-full p-3 mb-6 rounded-md border bg-background text-foreground"
           style="border: 1px solid hsl(var(--border));"
           oninput="filterRoutes()"/>

    <div class="flex flex-col md:flex-row gap-6">
        <div id="routeListContainer" class="md:w-1/2 lg:w-2/5 overflow-y-auto" style="max-height: 600px;">
            <div id="routeList" class="grid gap-4">
                <div th:each="r : ${routes}"
                     th:attr="data-code=${r.code},data-name=${r.name},data-from=${r.from},data-to=${r.to},data-via=${r.via},data-color=${r.color},data-path=${r.pathJson}"
                     class="route-card bg-card text-card-foreground p-5 rounded-lg border cursor-pointer transition"
                     style="border: 1px solid hsl(var(--border));"
                     onclick="highlight(this.dataset.code)">
                    <div class="flex items-center justify-between mb-2">
                        <span th:text="${r.code}"
                              class="text-primary-foreground px-3 py-1 rounded-md font-bold text-lg"
                              th:style="'background:' + ${r.color}">CODE</span>
                        <span class="text-sm text-muted-foreground" th:text="${r.fare}">₱13.00</span>
                    </div>
                    <h3 class="font-semibold mb-1" th:text="${r.name}">Name</h3>
                    <p class="text-sm text-muted-foreground"><strong>From:</strong> <span th:text="${r.from}"></span></p>
                    <p class="text-sm text-muted-foreground"><strong>To:</strong> <span th:text="${r.to}"></span></p>
                    <p class="text-sm text-muted-foreground mt-1"><strong>Via:</strong> <span th:text="${r.via}"></span></p>
                </div>
            </div>
            <div id="empty" class="text-center py-12 text-muted-foreground hidden">
                <p class="text-lg">No routes found</p>
            </div>
        </div>
        <div id="map" class="md:w-1/2 lg:w-3/5 rounded-lg overflow-hidden border border-border"
             style="height: 600px; border: 1px solid hsl(var(--border));"></div>
    </div>

    <p class="text-xs text-muted-foreground mt-8 text-center">
        Route data is for reference only. Actual routes and fares may vary.
    </p>
</main>

<script th:inline="javascript">
    const map = L.map('map').setView([10.3157, 123.8854], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const polylines = {};
    let activeCode = null;

    document.querySelectorAll('.route-card').forEach(card => {
        const code = card.dataset.code;
        const color = card.dataset.color;
        const path = JSON.parse(card.dataset.path);
        const line = L.polyline(path, { color: color, weight: 4, opacity: 0.9 })
            .bindPopup('<strong>' + code + '</strong> — ' + card.dataset.name +
                       '<br/>' + card.dataset.from + ' → ' + card.dataset.to)
            .on('click', () => highlight(code))
            .addTo(map);
        polylines[code] = line;
        L.marker(path[0]).bindPopup(code + ' start: ' + card.dataset.from).addTo(map);
    });

    function highlight(code) {
        activeCode = code;
        Object.entries(polylines).forEach(([c, line]) => {
            line.setStyle({
                weight: c === code ? 6 : 4,
                opacity: c === code ? 0.9 : 0.35
            });
        });
        document.querySelectorAll('.route-card').forEach(card => {
            card.style.boxShadow = card.dataset.code === code ? '0 0 0 2px hsl(var(--primary))' : '';
        });
    }

    function filterRoutes() {
        const term = document.getElementById('search').value.toLowerCase();
        let visible = 0;
        document.querySelectorAll('.route-card').forEach(card => {
            const haystack = (card.dataset.code + ' ' + card.dataset.name + ' ' +
                              card.dataset.from + ' ' + card.dataset.to + ' ' +
                              card.dataset.via).toLowerCase();
            const match = haystack.includes(term);
            card.style.display = match ? '' : 'none';
            if (match) visible++;
        });
        document.getElementById('empty').classList.toggle('hidden', visible !== 0);
    }
</script>
</body>
</html>
