<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('JeepSeek — Admin Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav(${currentPage})}"></nav>

<main class="max-w-5xl mx-auto mt-24 p-5">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Manage Users</h2>
        <a href="/admin/users/new" class="px-4 py-2 bg-primary text-primary-foreground rounded-md">+ New User</a>
    </div>

    <div class="bg-card text-card-foreground rounded-lg overflow-hidden">
        <table class="w-full text-sm">
            <thead style="background: hsl(var(--primary)); color: hsl(var(--primary-foreground));">
            <tr>
                <th class="text-left p-3">ID</th>
                <th class="text-left p-3">Name</th>
                <th class="text-left p-3">Email</th>
                <th class="text-left p-3">Role</th>
                <th class="text-right p-3">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}" class="border-t" style="border-color: hsl(var(--border));">
                <td class="p-3" th:text="${u.id}"></td>
                <td class="p-3" th:text="${u.name}"></td>
                <td class="p-3" th:text="${u.email}"></td>
                <td class="p-3" th:text="${u.role}"></td>
                <td class="p-3 text-right">
                    <a th:href="@{|/admin/users/${u.id}/edit|}" class="text-primary hover:underline mr-3">Edit</a>
                    <form th:action="@{|/admin/users/${u.id}/delete|}" method="post" class="inline"
                          onsubmit="return confirm('Delete this user?');">
                        <button class="text-red-600 hover:underline">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <form method="post" action="/logout" class="mt-4">
        <button class="text-sm text-muted-foreground hover:underline">Logout</button>
    </form>
</main>
</body>
</html>
