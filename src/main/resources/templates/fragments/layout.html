<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="/logo.png"/>
    <title th:text="${title}">JeepSeek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 150 3% 18%;
            --card: 39 50% 94%;
            --card-foreground: 150 3% 18%;
            --primary: 199 34% 39%;
            --primary-foreground: 0 0% 100%;
            --accent: 150 3% 18%; /* Original accent background */
            --accent-foreground: 0 0% 100%; /* Original accent text color */
            --muted-foreground: 215.4 16.3% 46.9%;
            --border: 214.3 31.8% 91.4%;
        }
        body { font-family: Arial, sans-serif; background: hsl(var(--background)); color: hsl(var(--foreground)); }
        .bg-primary { background: hsl(var(--primary)); }
        .text-primary { color: hsl(var(--primary)); }
        .text-primary-foreground { color: hsl(var(--primary-foreground)); }
        .bg-card { background: hsl(var(--card)); }
        .text-card-foreground { color: hsl(var(--card-foreground)); }
        .bg-accent { background: hsl(var(--accent)); }
        .text-accent-foreground { color: hsl(var(--accent-foreground)); }
        .text-muted-foreground { color: hsl(var(--muted-foreground)); }
        .border-border { border-color: hsl(var(--border)); }
        .bg-background { background: hsl(var(--background)); }

        /* Custom styles for menu highlighting */
        .nav-item-active {
            background: rgba(255, 255, 255, 0.3); /* Slightly transparent white background */
            color: hsl(var(--primary-foreground)); /* Keep text color consistent */
            font-weight: 600; /* Semibold */
        }
    </style>
</head>
<body>

<!-- Top navigation -->
<nav th:fragment="nav(currentPage)"
     class="fixed top-0 left-0 right-0 z-[9999] flex justify-between items-center text-primary-foreground px-5 py-3"
     style="background: hsl(var(--primary));">
    <afavicon href="/" class="flex items-center gap-2.5 cursor-pointer no-underline text-primary-foreground">
        <img src="/logo.png" class="h-8" alt="JeepSeek Logo"/>
        <h2 class="text-xl font-bold">JeepSeek</h2>
    </afavicon>
    <button onclick="document.getElementById('menu').classList.toggle('hidden')"
            class="p-2 rounded-md hover:bg-white/20">
        <!-- hamburger -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <div id="menu" class="hidden fixed top-0 right-0 h-full w-[280px] bg-primary text-primary-foreground p-5 shadow-lg z-[10000]"
         style="background: hsl(var(--primary));">
        <div class="flex justify-between items-center mb-6">
            <span class="text-lg font-semibold">Menu</span>
            <button onclick="document.getElementById('menu').classList.add('hidden')" class="p-1">✕</button>
        </div>
        <div class="flex flex-col gap-2">
            <a href="/routes"  th:classappend="${currentPage == 'routes'}  ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Routes</a>
            <a href="/about"   th:classappend="${currentPage == 'about'}   ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">About Us</a>
            <a href="/contact" th:classappend="${currentPage == 'contact'} ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Contact Us</a>

            <!-- Logged out -->
            <a th:if="${session.userId == null}" href="/userlogin" th:classappend="${currentPage == 'userlogin'} ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Login</a>
            <a th:if="${session.userId == null}" href="/register"  th:classappend="${currentPage == 'register'}  ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Sign Up</a>
            <a th:if="${session.userId == null}" href="/login"     th:classappend="${currentPage == 'login'}     ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Admin</a>

            <!-- Logged in -->
            <a th:if="${session.userId != null}" href="/profile" th:classappend="${currentPage == 'profile'} ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">
                Hi, <span th:text="${session.userName}">User</span>
            </a>
            <a th:if="${session.userRole == 'ADMIN'}" href="/admin/users" th:classappend="${currentPage == 'admin'} ? 'nav-item-active' : 'hover:bg-white/20 text-primary-foreground'" class="text-left px-4 py-3 rounded-md text-base no-underline">Admin Users</a>
            <form th:if="${session.userId != null}" method="post" action="/logout" class="mt-2">
                <button class="w-full text-left px-4 py-3 rounded-md text-base hover:bg-white/20 text-primary-foreground">Logout</button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
