<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('JeepSeek — Profile')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav(${currentPage})}"></nav>

<main class="max-w-3xl mx-auto mt-24 p-5 space-y-6">
    <section class="bg-card text-card-foreground p-5 rounded-lg">
        <h2 class="text-xl font-bold mb-2">My Account</h2>
        <p class="text-sm text-muted-foreground mb-3">
            Email: <span th:text="${user.email}"></span> ·
            Role: <span th:text="${user.role}"></span>
        </p>
        <form method="post" action="/profile/rename" class="flex gap-2">
            <input name="name" required th:value="${user.name}"
                   class="flex-1 p-2.5 rounded-md border" style="border:1px solid hsl(var(--border));"/>
            <button class="px-4 py-2 bg-primary text-primary-foreground rounded-md hover:opacity-90">Rename</button>
        </form>
        <form method="post" action="/logout" class="mt-3">
            <button class="text-sm text-muted-foreground hover:underline">Logout</button>
        </form>
    </section>

    <section class="bg-card text-card-foreground p-5 rounded-lg">
        <h3 class="text-lg font-bold mb-3">My Favorite Routes</h3>
        <p th:if="${#lists.isEmpty(favorites)}" class="text-sm text-muted-foreground">
            No favorites yet. Save some from the <a href="/routes" class="underline">Routes</a> page.
        </p>
        <ul class="space-y-2">
            <li th:each="f : ${favorites}" class="flex items-center justify-between p-3 rounded-md"
                style="background: hsl(var(--background));">
                <div>
                    <span class="font-semibold" th:text="${f.route.code}"></span> —
                    <span th:text="${f.route.name}"></span>
                    <div class="text-xs text-muted-foreground"
                         th:text="${f.route.from + ' → ' + f.route.to + ' · ' + f.route.fare}"></div>
                </div>
                <form method="post" action="/favorites/delete">
                    <input type="hidden" name="routeId" th:value="${f.route.id}"/>
                    <button class="text-sm text-red-600 hover:underline">Remove</button>
                </form>
            </li>
        </ul>
    </section>
</main>
</body>
</html>
